<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Champagne & Territorio - AR</title>

<script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
}

.infoBox{
position:absolute;
bottom:10px;
left:10px;
background:white;
padding:12px;
border-radius:10px;
max-width:300px;
}
</style>

</head>

<body>

<div class="infoBox">
<h3>🍾 Champagne</h3>

<b>Territorio:</b> Châlons-en-Champagne<br>

<b>Export:</b> 325 milioni bottiglie/anno<br>

<b>Valore economico:</b> ~6 miliardi €<br>

<b>Filiera:</b> viticoltura → vinificazione → export
</div>

<a-scene
embedded
arjs="sourceType: webcam; debugUIEnabled: false;"
>

<a-marker preset="hiro">

<a-entity
gltf-model="models/champagne.glb"
scale="0.5 0.5 0.5"
rotation="0 180 0"
position="0 0 0">
</a-entity>

<a-text
value="Champagne"
color="gold"
align="center"
position="0 1 0"
scale="2 2 2">
</a-text>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
